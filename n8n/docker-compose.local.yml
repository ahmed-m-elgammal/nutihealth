services:
  n8n:
    image: n8nio/n8n:latest
    container_name: nutrihealth-n8n-local
    ports:
      - "5678:5678"
    environment:
      - TZ=${TZ:-Africa/Cairo}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Africa/Cairo}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-false}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-change-me-local}
      - N8N_SECURE_COOKIE=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      - OPENROUTER_CHAT_MODEL=${OPENROUTER_CHAT_MODEL:-openai/gpt-4o-mini}
      - OPENROUTER_FITNESS_MODEL=${OPENROUTER_FITNESS_MODEL:-openai/gpt-4o-mini}
      - OPENROUTER_CHAT_COMPLETIONS_URL=${OPENROUTER_CHAT_COMPLETIONS_URL:-https://openrouter.ai/api/v1/chat/completions}
      - OPENROUTER_SITE_URL=${OPENROUTER_SITE_URL:-http://localhost:5678}
      - OPENROUTER_APP_NAME=${OPENROUTER_APP_NAME:-NutriHealth n8n Local}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_data:
